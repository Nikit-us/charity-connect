name: CI

on:
  push:
    branches:
      - master
      - develop
  pull_request:
    branches:
      - master
      - develop
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "21"

jobs:
  verify:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Verify
        run: ./gradlew --no-daemon clean build

  push-images:
    name: Push Images (GHCR)
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Docker login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image metadata
        id: meta
        shell: bash
        run: |
          REPO_LC="${GITHUB_REPOSITORY,,}"
          SHA_TAG="sha-${GITHUB_SHA::12}"
          if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            TAGS="latest,${SHA_TAG}"
          else
            TAGS="${GITHUB_REF_NAME},${SHA_TAG}"
          fi
          echo "repo_lc=${REPO_LC}" >> "${GITHUB_OUTPUT}"
          echo "tags=${TAGS}" >> "${GITHUB_OUTPUT}"

      - name: Build and push images with Jib
        run: |
          ./gradlew --no-daemon jibAll \
            -PimageRegistry=ghcr.io \
            -PimageRepository=${{ steps.meta.outputs.repo_lc }} \
            -PimageTags=${{ steps.meta.outputs.tags }}
